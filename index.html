<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brújula Financiera</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="contenedor">

    <section class="panel-izquierdo">

        <div class="marca">

            <h1>Brújula Financiera®</h1>

            <h2>
                Descubre el arquetipo financiero
                que guía tus decisiones.
            </h2>

            <p>

                Una evaluación basada en psicología financiera
                para identificar la forma en que administras,
                ahorras, gastas e inviertes tu dinero.

            </p>

        </div>

        <div class="ilustracion">

            <img
            src="https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=900"
            alt="Psicología financiera">

        </div>

    </section>

    <section class="panel-derecho">

        <div class="tarjeta">

            <h3>Iniciar evaluación</h3>

            <p>

                Completa tus datos para comenzar.

            </p>

            <label>Nombre completo</label>

            <input
            id="nombre"
            type="text"
            placeholder="Escribe tu nombre">

            <label>Edad</label>

            <input
            id="edad"
            type="number"
            placeholder="Edad">

            <button id="btnComenzar">

                Comenzar evaluación

            </button>

            <div id="app"></div>

        </div>

    </section>

</div>

<script src="preguntas.js"></script>

<script src="resultados.js"></script>

<script src="script.js"></script>

</body>

</html>
