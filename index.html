<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brújula Financiera</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="contenedor">

<div class="izquierda">

<h1>Brújula Financiera®</h1>

<h2>
Descubre el arquetipo financiero que guía tus decisiones.
</h2>

<p>

Responde la evaluación y conoce cómo piensas,
ahorras, gastas e inviertes.

</p>

</div>

<div class="derecha">

<div class="tarjeta">

<h3>Iniciar evaluación</h3>

<label>Nombre</label>

<input
type="text"
id="nombre"
placeholder="Escribe tu nombre">

<label>Edad</label>

<input
type="number"
id="edad"
placeholder="Edad">

<button id="btnComenzar">

Comenzar evaluación

</button>

<div id="app"></div>

</div>

</div>

</div>

<script src="preguntas.js"></script>

<script src="resultados.js"></script>

<script src="script.js"></script>

</body>

</html>
